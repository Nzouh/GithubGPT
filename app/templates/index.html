<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to GitHubGPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(120deg, #1f2937, #3f4c6b);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: #ffffff;
            color: #000000;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 30px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 5px;
            text-transform: uppercase;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-dashboard {
            background-color: #007bff;
            color: white;
        }
        .btn-dashboard:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        .btn-pull-request {
            background-color: #24292f;
            color: white;
        }
        .btn-pull-request:hover {
            background-color: #3b4046;
            transform: scale(1.05);
        }
        .header {
            font-size: 2rem;
            font-weight: 700;
        }
        .sub-header {
            font-size: 1rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="header">Welcome to GitHubGPT</h1>
        <p class="sub-header">{{ message }}</p>

        {% if logged_in %}
            <a href="/fetch-files" class="btn btn-dashboard">Begin Querying</a>
            <a href="/pull-review" class="btn btn-pull-request">Pull Review Request</a>
        {% else %}
            <a href="/login" class="btn btn-dashboard">Log in with GitHub</a>
        {% endif %}
    </div>
</body>
</html>
