<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch and Process Files</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(120deg, #1f2937, #3f4c6b);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: #ffffff;
            color: #000000;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }
        .btn-submit {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn-submit:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 class="text-center">Fetch and Process Files</h2>
        <form method="POST">
            <div class="mb-3">
                <label for="owner" class="form-label">Repository Owner</label>
                <input type="text" id="owner" name="owner" class="form-control" placeholder="Enter repository owner" required>
            </div>
            <div class="mb-3">
                <label for="repo" class="form-label">Repository Name</label>
                <input type="text" id="repo" name="repo" class="form-control" placeholder="Enter repository name" required>
            </div>
            <div class="mb-3">
                <label for="branch" class="form-label">Branch Name</label>
                <input type="text" id="branch" name="branch" class="form-control" value="main" required>
            </div>
            <div class="mb-3">
                <label for="extensions" class="form-label">File Extensions</label>
                <input type="text" id="extensions" name="extensions" class="form-control" value=".py,.md,.txt">
            </div>
            <button type="submit" class="btn btn-submit w-100">Fetch and Process Files</button>
        </form>
    </div>
</body>
</html>
