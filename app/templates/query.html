<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query Repository</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(120deg, #1f2937, #3f4c6b);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .card {
            background: #ffffff;
            color: #000000;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }
        .btn-submit {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 1rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        #results {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 10px;
            color: #212529;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 class="text-center">Ask a Query</h2>
        <form id="queryForm">
            <div class="mb-3">
                <label for="query" class="form-label">Your Query</label>
                <textarea id="query" name="query" class="form-control" rows="3" placeholder="Type your query here..." required></textarea>
            </div>
            <div class="mb-3">
                <label for="namespace" class="form-label">Namespace</label>
                <input type="text" id="namespace" name="namespace" class="form-control" value="default" readonly>
            </div>
            <button type="submit" class="btn btn-submit w-100">Search</button>
        </form>
        <div id="results" style="display: none;"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            $('#queryForm').on('submit', function (event) {
                event.preventDefault();
                const query = $('#query').val();
                const namespace = $('#namespace').val();
                const top_k = 5; // Default value for top_k
    
                $.ajax({
                    url: '/query',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ query, namespace, top_k }),
                    success: function (response) {
                        $('#results').html(`<strong>Response:</strong> <p>${response.result}</p>`).show();
                    },
                    error: function (xhr) {
                        $('#results').html(`<strong>Error:</strong> <p>${xhr.responseJSON.result || 'Something went wrong. Please try again.'}</p>`).show();
                    }
                });
            });
        });
    </script>
    
</body>
</html>
